name: Build libmpv with CAVS/AVS2 support (Android, dynamic, stripped, optimized)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. libmpv-cavs-dynamic-latest)"
        required: true
        default: "libmpv-cavs-dynamic-latest"

permissions:
  contents: write

env:
  MPV_ANDROID_REF: "2026-04-25"

jobs:
  build:
    name: Build libmpv ${{ matrix.arch.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        arch:
          - { name: arm64-v8a, buildall_arg: arm64 }
          - { name: armeabi-v7a, buildall_arg: armv7l }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ninja-build pkg-config \
            nasm yasm python3-pip git autoconf automake libtool \
            cmake ccache unzip wget curl \
            libssl-dev zlib1g-dev gperf patchelf
          sudo pip3 install --upgrade meson mako
          meson --version

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "ndk;29.0.14206865" "platform-tools"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"

      - name: Clone mpv-android
        run: |
          git clone --depth 1 --branch ${{ env.MPV_ANDROID_REF }} \
            https://github.com/mpv-android/mpv-android.git
          cd mpv-android
          git submodule update --init --recursive || true

      - name: Download CAVS patches
        run: |
          mkdir -p cavs_patches
          CAVS_PATCHES="d208cf8 48ad875 e633613 fb9a3ec 0de8ee1 4cd3e6d"
          for sha in $CAVS_PATCHES; do
            echo "Downloading CAVS patch $sha..."
            curl -fsSL "https://github.com/llawsxx/FFmpeg/commit/${sha}.patch" \
              -o "cavs_patches/${sha}.patch" || { echo "Failed to download patch $sha"; exit 1; }
          done
          ls -la cavs_patches/

      - name: Patch buildscripts
        run: |
          cd mpv-android/buildscripts

          # === 1. depinfo.sh: add davs2 ===
          sed -i '/^v_libxml2=/a v_davs2=1.7' include/depinfo.sh
          sed -i '/^dep_dav1d=/a dep_davs2=()' include/depinfo.sh
          sed -i 's/dep_ffmpeg=(mbedtls dav1d libxml2)/dep_ffmpeg=(mbedtls dav1d libxml2 davs2)/' include/depinfo.sh

          # === 2. download-deps.sh: add davs2 download ===
          # Clone WITHOUT --depth 1 so version.sh can use git rev-list
          sed -i '/\[ ! -d dav1d \] && git clone/a [ ! -d davs2 ] && git clone --branch 1.7 https://github.com/pkuvcl/davs2.git' include/download-deps.sh

          # === 3. Create scripts/davs2.sh ===
          printf '%s\n' \
            '#!/bin/bash -e' \
            '. ../../include/path.sh' \
            'if [ "$1" == "build" ]; then' \
            '	true' \
            'elif [ "$1" == "clean" ]; then' \
            '	rm -rf _build$ndk_suffix' \
            '	exit 0' \
            'else' \
            '	exit 255' \
            'fi' \
            'export CC="$CXX"' \
            'cd build/linux' \
            './configure \' \
            '	--host=$ndk_triple \' \
            '	--prefix=/ \' \
            '	--enable-shared \' \
            '	--disable-static \' \
            '	--enable-pic \' \
            '	--disable-asm' \
            'make -j$cores lib-shared' \
            'make DESTDIR="$prefix_dir" install-lib-shared' \
            '# Fix .pc file: ensure Version field is correct (version.sh may fail with shallow clone)' \
            'PC_FILE="$prefix_dir/lib/pkgconfig/davs2.pc"' \
            'if [ -f "$PC_FILE" ]; then' \
            '    echo "=== davs2.pc before fix ==="' \
            '    cat "$PC_FILE"' \
            '    if ! grep -q "^Version: 1" "$PC_FILE"; then' \
            '        if grep -q "^Version:" "$PC_FILE"; then' \
            '            sed -i "s/^Version:.*/Version: 1.7.0/" "$PC_FILE"' \
            '        else' \
            '            sed -i "/^Name:/a Version: 1.7.0" "$PC_FILE"' \
            '        fi' \
            '        echo "=== davs2.pc after fix ==="' \
            '        cat "$PC_FILE"' \
            '    fi' \
            'fi' \
            'ls -la "$prefix_dir/lib/libdavs2.so"* "$prefix_dir/lib/pkgconfig/davs2.pc" 2>/dev/null || { echo "ERROR: davs2 build failed"; exit 1; }' \
            > scripts/davs2.sh
          chmod +x scripts/davs2.sh

          # === 4. Patch ffmpeg.sh ===
          sed -i 's/--enable-{jni,mediacodec,mbedtls,libdav1d,libxml2}/--enable-{jni,mediacodec,mbedtls,libdav1d,libxml2,libdavs2}/' scripts/ffmpeg.sh
          sed -i 's/--cc=$CC --pkg-config=pkg-config --nm=llvm-nm/--cc=$CC --pkg-config=pkg-config --nm=llvm-nm --ar=llvm-ar --ranlib=llvm-ranlib --enable-small --optflags=-Os/' scripts/ffmpeg.sh

          # === 4c. Decoder list ===
          printf '%s\n' \
            '	--disable-decoders' \
            '	--enable-decoder=h264,hevc,mpeg1video,mpeg2video,mpeg4,msmpeg4v1,msmpeg4v2,msmpeg4v3' \
            '	--enable-decoder=h263,h263i,h263p,flv,svq1,svq3,amv' \
            '	--enable-decoder=vp3,vp5,vp6,vp6a,vp6f,vp7,vp8,vp9,av1' \
            '	--enable-decoder=cavs,libdav1d,libdavs2,avs3' \
            '	--enable-decoder=vc1,vc1image,wmv1,wmv2,wmv3,wmv3image' \
            '	--enable-decoder=theora,dvvideo,rawvideo' \
            '	--enable-decoder=mjpeg,jpegls,png,prores,ffv1,huffyuv' \
            '	--enable-decoder=rv10,rv20,rv30,rv40' \
            '	--enable-decoder=4xm,qtrle,cinepak,msrle,msvideo1,utvideo,indeo3,indeo5' \
            '	--enable-decoder=zlib,bzlib' \
            '	--enable-decoder=h264_mediacodec,hevc_mediacodec,mpeg2_mediacodec,mpeg4_mediacodec,vp8_mediacodec,vp9_mediacodec,av1_mediacodec' \
            '	--enable-decoder=aac,aac_latm,mp3,mp2,mp1,ac3,eac3,dca,flac,opus,vorbis,alac' \
            '	--enable-decoder=pcm_s16le,pcm_s24le,pcm_s32le,pcm_s16be,pcm_s24be,pcm_s32be' \
            '	--enable-decoder=pcm_u8,pcm_f32le,pcm_f64le,pcm_s8,pcm_u16le,pcm_u24le,pcm_u32le' \
            '	--enable-decoder=adpcm_ima_wav,adpcm_ms,adpcm_adx,adpcm_swf,g729' \
            '	--enable-decoder=wmav1,wmav2,wmapro,wmalossless,wmavoice,cook,ra_144,ra_288,sipr' \
            '	--enable-decoder=truehd,mlp,atrac3,atrac1,atrac3p' \
            '	--enable-decoder=amrnb,amrwb,g726,g722' \
            '	--enable-decoder=tak,tta,ape,shorten,imc' \
            > /tmp/decoders.txt
          sed -i '/--disable-{muxers,encoders,devices}/r /tmp/decoders.txt' scripts/ffmpeg.sh
          echo "=== ffmpeg.sh decoder count ==="
          grep -c "enable-decoder" scripts/ffmpeg.sh

      - name: Download dependencies
        run: |
          cd mpv-android/buildscripts
          export IN_CI=1
          ./download.sh
          echo "=== davs2 source check ==="
          ls -la deps/davs2/build/linux/configure 2>/dev/null || { echo "ERROR: davs2 not found"; exit 1; }

      - name: Patch davs2 source for NULL safety
        run: |
          cd mpv-android/buildscripts
          DAVS2_DIR=$(find . -type d -name "davs2" | grep -v ".git" | head -1)
          [ -d "$DAVS2_DIR/source" ] || { echo "ERROR: davs2 source not found"; exit 1; }
          cd "$DAVS2_DIR"

          echo "=== davs2 source files ==="
          find source -name "*.cc" -o -name "*.c" | sort

          # Use Python for reliable patching of davs2 source
          python3 << 'PYEOF'
          import os, glob

          # Patch davs2.cc: add NULL guards at API entry points
          davs2_cc = "source/common/davs2.cc"
          if os.path.exists(davs2_cc):
              with open(davs2_cc, 'r', encoding='latin-1') as f:
                  content = f.read()
              orig = content

              # Add NULL guard after each API function's opening brace
              # These are exact patterns from davs2 1.7 source
              patches = [
                  # davs2_decoder_send_packet
                  ('int davs2_decoder_send_packet', '    if (!h || !pkt || !pkt->data || pkt->len <= 0) return DAVS2_ERROR;\n'),
                  # davs2_decoder_recv_frame
                  ('int davs2_decoder_recv_frame', '    if (!h) return DAVS2_ERROR;\n'),
                  # davs2_decoder_flush
                  ('int davs2_decoder_flush', '    if (!h) return DAVS2_ERROR;\n'),
                  # davs2_decoder_close
                  ('void davs2_decoder_close', '    if (!h) return;\n'),
              ]

              for func_sig, guard_line in patches:
                  if guard_line.strip() not in content:
                      # Find the function and insert guard after opening brace
                      idx = content.find(func_sig)
                      if idx >= 0:
                          brace_idx = content.find('{', idx)
                          if brace_idx >= 0:
                              insert_pos = brace_idx + 1
                              content = content[:insert_pos] + '\n' + guard_line + content[insert_pos:]
                              print(f"  Patched: {func_sig}")
                      else:
                          print(f"  NOT FOUND: {func_sig}")
                  else:
                      print(f"  Already patched: {func_sig}")

              # Protect destroy_dpb calls
              content = content.replace(
                  'destroy_dpb(mgr);',
                  'if (mgr && mgr->dpb != NULL) destroy_dpb(mgr);'
              )

              if content != orig:
                  with open(davs2_cc, 'w', encoding='latin-1') as f:
                      f.write(content)
                  print(f"  Written: {davs2_cc}")

          # Patch decoder.cc: add NULL guards
          decoder_cc = "source/common/decoder.cc"
          if os.path.exists(decoder_cc):
              with open(decoder_cc, 'r', encoding='latin-1') as f:
                  content = f.read()
              orig = content

              for func_sig in ['void decoder_close', 'int decoder_decode_frame', 'int decoder_decode_nal']:
                  guard = '    if (h == NULL) return -1;\n'
                  if func_sig == 'void decoder_close':
                      guard = '    if (h == NULL) return;\n'
                  if guard.strip() not in content:
                      idx = content.find(func_sig)
                      if idx >= 0:
                          brace_idx = content.find('{', idx)
                          if brace_idx >= 0:
                              insert_pos = brace_idx + 1
                              content = content[:insert_pos] + '\n' + guard + content[insert_pos:]
                              print(f"  Patched: {func_sig}")

              if content != orig:
                  with open(decoder_cc, 'w', encoding='latin-1') as f:
                      f.write(content)
                  print(f"  Written: {decoder_cc}")

          print("=== davs2 patch done ===")
          PYEOF

          echo "=== davs2 patch verification ==="
          grep -rn "if (!h" source/ 2>/dev/null | head -20
          grep -rn "if (h == NULL)" source/ 2>/dev/null | head -20

      - name: Patch FFmpeg libdavs2.c wrapper (CRITICAL FIX)
        run: |
          cd mpv-android/buildscripts
          FFMPEG_DIR=""
          for c in deps/ffmpeg sources/ffmpeg; do
            [ -d "$c/libavcodec" ] && FFMPEG_DIR="$c" && break
          done
          if [ -z "$FFMPEG_DIR" ]; then
            FFMPEG_DIR=$(find . -type d -name "ffmpeg" | grep -v ".git" | head -1)
          fi
          [ -d "$FFMPEG_DIR/libavcodec" ] || { echo "ERROR: no FFmpeg"; exit 1; }
          LIBDAVS2_C="$FFMPEG_DIR/libavcodec/libdavs2.c"
          [ -f "$LIBDAVS2_C" ] || { echo "ERROR: libdavs2.c not found"; exit 1; }

          echo "=== Original libdavs2.c key lines ==="
          grep -n "thread_count\|param.threads\|cad->packet.data\|davs2_decoder_send_packet\|davs2_decoder_recv_frame\|DAVS2_ERROR\|can't read\|buf_ptr" "$LIBDAVS2_C" | head -30

          # Write Python patch script to file (avoids YAML heredoc indentation issues)
          cat > /tmp/patch_davs2.py << 'SCRIPT_EOF'
          import sys, os, re

          # Find libdavs2.c
          file_path = ""
          for d in ['deps/ffmpeg', 'sources/ffmpeg']:
              p = os.path.join(d, 'libavcodec', 'libdavs2.c')
              if os.path.exists(p):
                  file_path = p
                  break
          if not file_path:
              import subprocess
              r = subprocess.run(['find', '.', '-name', 'libdavs2.c', '-path', '*/libavcodec/*'],
                                 capture_output=True, text=True)
              file_path = r.stdout.strip().split('\n')[0] if r.stdout.strip() else ""

          if not file_path or not os.path.exists(file_path):
              print("ERROR: libdavs2.c not found")
              sys.exit(1)

          print(f"Patching: {file_path}")
          with open(file_path, 'r', encoding='latin-1') as f:
              content = f.read()

          original = content
          ok = []
          fail = []

          # PATCH 1: Force single-threaded (THE CRITICAL FIX)
          # Actual code: cad->param.threads = avctx->thread_count;
          # Previous bug: searched for 'davs2_default_read_parameters' which doesn't exist!
          old_t = 'cad->param.threads = avctx->thread_count;'
          new_t = 'cad->param.threads = 1; /* FORCE_SINGLE_THREAD: prevent SIGSEGV */'
          if old_t in content:
              content = content.replace(old_t, new_t)
              ok.append("1: Force single-thread (exact match)")
          elif 'FORCE_SINGLE_THREAD' in content:
              ok.append("1: Already applied")
          else:
              content = re.sub(r'cad->param\.threads\s*=\s*[^;]+;', new_t, content)
              if 'FORCE_SINGLE_THREAD' in content:
                  ok.append("1: Force single-thread (regex)")
              else:
                  fail.append("1: Cannot find thread line")

          # PATCH 2: Skip corrupt/empty packets + NULL decoder check
          # Build C code block using string concatenation (YAML-safe)
          nl = '\n'
          corrupt_block = (
              "    /* CRASH_FIX: skip corrupt/empty packets */" + nl +
              "    if (!buf_ptr || buf_size <= 0) {" + nl +
              "        *got_frame = 0;" + nl +
              "        return 0;" + nl +
              "    }" + nl +
              "    if (avpkt->flags & AV_PKT_FLAG_CORRUPT) {" + nl +
              '        av_log(avctx, AV_LOG_WARNING, "Skipping corrupt AVS2 packet\\n");' + nl +
              "        if (cad->decoder)" + nl +
              "            davs2_decoder_flush(cad->decoder, &cad->headerset, &cad->out_frame);" + nl +
              "        *got_frame = 0;" + nl +
              "        return buf_size;" + nl +
              "    }" + nl +
              "    /* NULL_DECODER_CHECK */" + nl +
              "    if (!cad->decoder) {" + nl +
              "        *got_frame = 0;" + nl +
              "        return buf_size;" + nl +
              "    }" + nl +
              "    cad->packet.data = buf_ptr;"
          )
          old_pkt = '    cad->packet.data = buf_ptr;'
          if old_pkt in content and 'CRASH_FIX' not in content:
              content = content.replace(old_pkt, corrupt_block, 1)
              ok.append("2: Corrupt skip + NULL check")
          elif 'CRASH_FIX' in content:
              ok.append("2: Already applied")
          else:
              fail.append("2: Cannot find packet.data line")

          # PATCH 3: Make send_packet error non-fatal
          old_se = (
              "    if (ret == DAVS2_ERROR) {" + nl +
              '        av_log(avctx, AV_LOG_ERROR, "Decoder error: can\'t read packet\\n");' + nl +
              "        return AVERROR_EXTERNAL;" + nl +
              "    }"
          )
          new_se = (
              "    if (ret == DAVS2_ERROR) {" + nl +
              '        av_log(avctx, AV_LOG_WARNING, "Decoder warning: can\'t read packet, flushing\\n");' + nl +
              "        davs2_decoder_flush(cad->decoder, &cad->headerset, &cad->out_frame);" + nl +
              "        *got_frame = 0;" + nl +
              "        return buf_size;" + nl +
              "    }"
          )
          if old_se in content:
              content = content.replace(old_se, new_se, 1)
              ok.append("3: send_packet non-fatal")
          elif "can't read packet, flushing" in content:
              ok.append("3: Already applied")
          else:
              fail.append("3: Cannot find send error block")

          # PATCH 4: recv_frame error recovery
          # IMPORTANT: Do NOT use re.sub for replacement because it processes
          # escape sequences in the replacement string, turning \\n into a real
          # newline instead of the literal \n needed for C code.
          # Instead, use re.search to find the pattern, then str.replace to insert.
          if 'ERROR_RECOVERY' not in content and 'davs2_decoder_recv_frame' in content:
              pattern = re.compile(r'ret\s*=\s*davs2_decoder_recv_frame\([^)]+\)\s*;')
              match = pattern.search(content)
              if match:
                  matched_text = match.group(0)
                  recovery_block = (
                      "\n    /* ERROR_RECOVERY */" + nl +
                      "    if (ret == DAVS2_ERROR) {" + nl +
                      '        av_log(avctx, AV_LOG_WARNING, "davs2 recv_frame error, flushing\\n");' + nl +
                      "        davs2_decoder_flush(cad->decoder, &cad->headerset, &cad->out_frame);" + nl +
                      "        *got_frame = 0;" + nl +
                      "        return buf_size;" + nl +
                      "    }"
                  )
                  content = content.replace(matched_text, matched_text + recovery_block, 1)
                  if 'ERROR_RECOVERY' in content:
                      ok.append("4: recv_frame error recovery")
                  else:
                      fail.append("4: Cannot patch recv_frame")
              else:
                  fail.append("4: Cannot find recv_frame pattern")
          else:
              ok.append("4: Already applied or not needed")

          # Write
          if content != original:
              with open(file_path, 'w', encoding='latin-1') as f:
                  f.write(content)
              print("=== libdavs2.c PATCHED ===")
          else:
              print("=== WARNING: No changes ===")

          for p in ok:
              print(f"  OK:   {p}")
          for p in fail:
              print(f"  FAIL: {p}")

          # Verify
          with open(file_path, 'r', encoding='latin-1') as f:
              v = f.read()
          checks = [
              ('Single-thread', 'param.threads = 1'),
              ('Corrupt skip', 'CRASH_FIX'),
              ('NULL decoder', 'NULL_DECODER_CHECK'),
              ('Error recovery', 'ERROR_RECOVERY'),
              ('Flush on send error', "can't read packet, flushing"),
          ]
          all_ok = True
          for name, marker in checks:
              if marker in v:
                  print(f"  OK:   {name}")
              else:
                  print(f"  FAIL: {name}")
                  all_ok = False
          if not all_ok:
              print(v[:3000])
              sys.exit(1)
          print("=== ALL PATCHES VERIFIED ===")
          SCRIPT_EOF

          python3 /tmp/patch_davs2.py

      - name: Apply CAVS patches to FFmpeg
        run: |
          cd mpv-android/buildscripts
          FFMPEG_DIR=""
          for c in deps/ffmpeg sources/ffmpeg; do
            [ -d "$c/libavcodec" ] && FFMPEG_DIR="$c" && break
          done
          if [ -z "$FFMPEG_DIR" ]; then
            FFMPEG_DIR=$(find . -type d -name "ffmpeg" | grep -v ".git" | head -1)
          fi
          [ -d "$FFMPEG_DIR/libavcodec" ] || { echo "ERROR: no FFmpeg"; exit 1; }
          cd "$FFMPEG_DIR"

          PATCHES_DIR="$GITHUB_WORKSPACE/cavs_patches"
          for sha in d208cf8 48ad875 e633613 fb9a3ec 0de8ee1 4cd3e6d; do
            echo "=== Applying $sha ==="
            patch -p1 --batch --forward -i "$PATCHES_DIR/${sha}.patch" || true
          done

          if ! grep -q AV_CODEC_ID_DRA libavcodec/codec_id.h; then
            if grep -q 'AV_CODEC_ID_AHX,' libavcodec/codec_id.h; then
              perl -i -pe 's/(AV_CODEC_ID_AHX,)/$1\n    AV_CODEC_ID_DRA,/' libavcodec/codec_id.h
            elif grep -q 'AV_CODEC_ID_G728,' libavcodec/codec_id.h; then
              perl -i -pe 's/(AV_CODEC_ID_G728,)/$1\n    AV_CODEC_ID_DRA,/' libavcodec/codec_id.h
            else
              echo "ERROR: cannot add DRA"; exit 1
            fi
          fi
          ls -la libavcodec/libcavs* libavcodec/dradec* 2>/dev/null || { echo "ERROR: CAVS patch failed"; exit 1; }

      - name: Build libmpv
        run: |
          cd mpv-android/buildscripts
          export IN_CI=1
          ./buildall.sh --arch ${{ matrix.arch.buildall_arg }} mpv
          find . -name "*.so" -ls 2>/dev/null || true

      - name: Collect and strip all .so files
        run: |
          cd mpv-android/buildscripts
          mkdir -p "artifacts/${{ matrix.arch.name }}"
          STRIP_TOOL="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"

          PREFIX_LIB=""
          for d in "prefix/${{ matrix.arch.buildall_arg }}/lib" "prefix/arm64/lib" "prefix/armv7l/lib"; do
            if [ -d "$d" ] && ls "$d"/*.so 1>/dev/null 2>&1; then
              PREFIX_LIB="$d"
              break
            fi
          done

          if [ -z "$PREFIX_LIB" ]; then
            echo "ERROR: no .so files found in prefix"
            find . -name "*.so" -ls | head -30
            exit 1
          fi

          echo "=== Collecting .so from $PREFIX_LIB ==="
          for so in "$PREFIX_LIB"/*.so; do
            [ -f "$so" ] || continue
            base=$(basename "$so")
            echo "--- $base ---"
            echo "Before strip: $(ls -lh "$so" | awk '{print $5}')"
            if [ -f "$STRIP_TOOL" ]; then
              "$STRIP_TOOL" --strip-all "$so" 2>/dev/null || true
              echo "After strip:  $(ls -lh "$so" | awk '{print $5}')"
            fi
            cp -L "$so" "artifacts/${{ matrix.arch.name }}/"
          done

          if [ -f "$PREFIX_LIB/libdavs2.so" ]; then
            echo "libdavs2.so collected"
          else
            echo "WARNING: libdavs2.so not found in $PREFIX_LIB"
            find . -name "libdavs2.so" -ls 2>/dev/null || true
          fi

          # === Fix versioned SONAME in libdavs2.so ===
          DAVS2_SO="artifacts/${{ matrix.arch.name }}/libdavs2.so"
          AVCODEC_SO="artifacts/${{ matrix.arch.name }}/libavcodec.so"
          if [ -f "$DAVS2_SO" ]; then
            OLD_SONAME=$(patchelf --print-soname "$DAVS2_SO" 2>/dev/null || echo "")
            echo "libdavs2.so current SONAME: '$OLD_SONAME'"
            if [ "$OLD_SONAME" != "libdavs2.so" ]; then
              patchelf --set-soname libdavs2.so "$DAVS2_SO"
              echo "Patched libdavs2.so SONAME -> libdavs2.so"
            fi
          fi
          if [ -f "$AVCODEC_SO" ]; then
            NEEDED=$(patchelf --print-needed "$AVCODEC_SO" 2>/dev/null | grep davs2 || echo "")
            echo "libavcodec.so davs2 NEEDED: '$NEEDED'"
            if echo "$NEEDED" | grep -q "libdavs2.so.16"; then
              patchelf --replace-needed libdavs2.so.16 libdavs2.so "$AVCODEC_SO"
              echo "Patched libavcodec.so NEEDED: libdavs2.so.16 -> libdavs2.so"
            fi
          fi

          echo "=== Final artifacts ==="
          ls -lh "artifacts/${{ matrix.arch.name }}/"
          echo "=== SONAME/NEEDED verification ==="
          for so in "artifacts/${{ matrix.arch.name }}"/*.so; do
            base=$(basename "$so")
            soname=$(patchelf --print-soname "$so" 2>/dev/null || echo "N/A")
            needed=$(patchelf --print-needed "$so" 2>/dev/null | grep davs2 || echo "")
            echo "  $base: SONAME=$soname  davs2_NEEDED=$needed"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-cavs-android-${{ matrix.arch.name }}
          path: mpv-android/buildscripts/artifacts/${{ matrix.arch.name }}/
          retention-days: 7

  release:
    name: Package and upload
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: libmpv-cavs-android-*
          path: artifacts
          merge-multiple: false

      - name: Package
        run: |
          mkdir -p release/jniLibs
          for arch in arm64-v8a armeabi-v7a; do
            DIR="artifacts/libmpv-cavs-android-$arch"
            if [ -d "$DIR" ]; then
              mkdir -p "release/jniLibs/$arch"
              cp "$DIR"/*.so "release/jniLibs/$arch/"
              echo "=== $arch ==="
              ls -la "release/jniLibs/$arch/"
            fi
          done
          for arch in arm64-v8a armeabi-v7a; do
            [ -f "release/jniLibs/$arch/libmpv.so" ] || { echo "ERROR: missing $arch libmpv.so"; exit 1; }
            [ -f "release/jniLibs/$arch/libavcodec.so" ] || { echo "ERROR: missing $arch libavcodec.so"; exit 1; }
            [ -f "release/jniLibs/$arch/libdavs2.so" ] || { echo "ERROR: missing $arch libdavs2.so"; exit 1; }
          done
          cd release
          tar czf libmpv-cavs-android-dynamic.tar.gz jniLibs
          ls -lh libmpv-cavs-android-dynamic.tar.gz

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: release/libmpv-cavs-android-dynamic.tar.gz
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
