name: Build libmpv with CAVS/AVS2 support (Android, static, stripped)

# 构建 Android 版 libmpv（带 CAVS Guangdian profile + AVS2 支持）
#   1. FFmpeg 静态链接进 libmpv.so（不再产出独立 libavcodec.so 等，避免与 nextlib 冲突）
#   2. FFmpeg 裁剪解码器（只保留 IPTV 常用格式，体积从 ~100MB 降到 ~15-20MB）
#   3. 只构建 arm64-v8a 和 armeabi-v7a（匹配主项目 build.gradle）
#   4. 最终产物只有 libmpv.so 一个文件 
#
# CAVS (AVS1-P16, 广电 profile) 通过 patch 修改内置 cavs 解码器实现
# AVS2 (4K) 通过 libdavs2 外部库实现（--enable-libdavs2，静态链接）

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload libmpv to (e.g. libmpv-cavs-static-latest)"
        required: true
        default: "libmpv-cavs-static-latest"

permissions:
  contents: write

env:
  MPV_ANDROID_REF: "2026-04-25"

jobs:
  build:
    name: Build libmpv for Android
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        # 只构建主项目需要的两个 ABI
        arch:
          - { name: arm64-v8a, buildall_arg: arm64 }
          - { name: armeabi-v7a, buildall_arg: armv7l }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ninja-build pkg-config \
            nasm yasm python3-pip git autoconf automake libtool \
            cmake ccache unzip wget curl \
            libssl-dev zlib1g-dev gperf
          sudo pip3 install --upgrade meson mako
          meson --version

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "ndk;29.0.14206865" "platform-tools"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"
          ls -la "$ANDROID_HOME/ndk/"

      - name: Clone mpv-android
        run: |
          git clone --depth 1 --branch ${{ env.MPV_ANDROID_REF }} \
            https://github.com/mpv-android/mpv-android.git
          cd mpv-android
          git submodule update --init --recursive || true
          echo "=== buildscripts structure ==="
          ls -la buildscripts/
          ls -la buildscripts/scripts/ 2>/dev/null || true
          ls -la buildscripts/include/ 2>/dev/null || true

      - name: Download CAVS patches
        run: |
          mkdir -p cavs_patches
          CAVS_PATCHES="d208cf8 48ad875 e633613 fb9a3ec 0de8ee1 4cd3e6d"
          for sha in $CAVS_PATCHES; do
            echo "Downloading CAVS patch $sha..."
            curl -fsSL "https://github.com/llawsxx/FFmpeg/commit/${sha}.patch" \
              -o "cavs_patches/${sha}.patch" || { echo "Failed to download patch $sha"; exit 1; }
          done
          ls -la cavs_patches/

      - name: Configure buildscripts (davs2 + static FFmpeg + decoder stripping)
        # 一次性完成所有 buildscripts 修改：
        # 1. 添加 davs2 依赖声明和下载逻辑
        # 2. 创建 davs2.sh（静态编译）
        # 3. 修改 ffmpeg.sh：静态链接 + 裁剪解码器 + 启用 libdavs2
        # 4. 修改 mpv.sh：创建 pkg-config --static 包装器 + 清理 .so 文件
        run: |
          cd mpv-android/buildscripts

          # ========================================
          # 1. depinfo.sh：添加 davs2 版本和依赖声明
          # ========================================
          sed -i '/^v_libxml2=/a v_davs2=1.7' include/depinfo.sh
          sed -i '/^dep_dav1d=/a dep_davs2=()' include/depinfo.sh
          sed -i 's/dep_ffmpeg=(mbedtls dav1d libxml2)/dep_ffmpeg=(mbedtls dav1d libxml2 davs2)/' include/depinfo.sh
          echo "=== Patched depinfo.sh (davs2 entries) ==="
          grep -E "davs2|dep_ffmpeg=" include/depinfo.sh

          # ========================================
          # 2. download-deps.sh：添加 davs2 源码下载
          # ========================================
          sed -i '/^\[ ! -d dav1d \] && git clone https:\/\/github.com\/videolan\/dav1d$/a # davs2\n[ ! -d davs2 ] \&\& git clone --depth 1 --branch 1.7 https:\/\/github.com\/pkuvcl\/davs2.git' include/download-deps.sh
          echo "=== Patched download-deps.sh (davs2 section) ==="
          grep -A2 -B1 "davs2" include/download-deps.sh

          # ========================================
          # 3. 创建 scripts/davs2.sh（静态编译）
          #    静态库会被链接进 FFmpeg 的 .a，最终全部嵌入 libmpv.so
          # ========================================
          cat > scripts/davs2.sh <<'DAVS2_EOF'
          #!/bin/bash -e
          . ../../include/path.sh
          if [ "$1" == "build" ]; then
          	true
          elif [ "$1" == "clean" ]; then
          	rm -rf _build$ndk_suffix
          	exit 0
          else
          	exit 255
          fi
          # davs2 是 C++ 项目（默认用 g++），NDK 只有 clang++，用 CXX 覆盖
          export CC="$CXX"
          # 修复 version.sh 需要 origin/master 引用
          git fetch origin --depth 1 master:refs/remotes/origin/master
          cd build/linux
          # 静态编译：--disable-shared --enable-static
          # --enable-pic：生成位置无关代码（libmpv.so 是动态库，需要 -fPIC）
          # --disable-asm：避免 armv7/x86 汇编兼容问题
          ./configure \
          	--host=$ndk_triple \
          	--prefix=/ \
          	--disable-shared \
          	--enable-static \
          	--enable-pic \
          	--disable-asm
          # 只构建静态库，跳过 test 二进制（test 需要 -llog，链接会失败）
          make -j$cores lib-static
          make DESTDIR="$prefix_dir" install-lib-static
          DAVS2_EOF
          chmod +x scripts/davs2.sh
          echo "=== Created scripts/davs2.sh (static) ==="

          # ========================================
          # 4. 修改 scripts/ffmpeg.sh
          #    a) --enable-libdavs2
          #    b) 共享→静态
          #    c) 裁剪解码器（只保留 IPTV 常用格式）
          # ========================================

          # 4a. 添加 --enable-libdavs2
          sed -i 's/--enable-{jni,mediacodec,mbedtls,libdav1d,libxml2}/--enable-{jni,mediacodec,mbedtls,libdav1d,libxml2,libdavs2}/' scripts/ffmpeg.sh
          echo "=== Patched ffmpeg.sh (libdavs2 enabled) ==="
          grep "enable-" scripts/ffmpeg.sh

          # 4b. + 4c. 用 Python 做可靠的多行修改
          python3 <<'PYEOF'
          with open('scripts/ffmpeg.sh', 'r') as f:
              content = f.read()

          # 共享 → 静态
          content = content.replace(
              '--disable-static --enable-shared',
              '--enable-static --disable-shared'
          )

          # 在 --disable-{muxers,encoders,devices} 后面插入解码器裁剪
          old_line = '\t--disable-{muxers,encoders,devices}'
          new_lines = """\t--disable-{muxers,encoders,devices}
\t# === 解码器裁剪（只保留 IPTV 常用格式）===
\t--disable-decoders
\t# 视频解码器（IPTV/点播常见格式）
\t--enable-decoder=h264,hevc,mpeg1video,mpeg2video,mpeg4,msmpeg4v1,msmpeg4v2,msmpeg4v3
\t--enable-decoder=h263,h263i,h263p,flv,svq1,svq3,amv
\t--enable-decoder=vp3,vp5,vp6,vp6a,vp6f,vp7,vp8,vp9,av1
\t--enable-decoder=cavs,libdav1d,libdavs2,dra
\t--enable-decoder=vc1,vc1image,wmv1,wmv2,wmv3,wmv3image
\t--enable-decoder=theora,dvvideo,rawvideo
\t--enable-decoder=mjpeg,jpegls,png,prores,ffv1,huffyuv
\t--enable-decoder=rv10,rv20,rv30,rv40
\t--enable-decoder=4xm,qtrle,cinepak,msrle,msvideo1,utvideo,indeo3,indeo5
\t--enable-decoder=zlib,bzlib
\t# MediaCodec 硬件解码器（FFmpeg 层）
\t--enable-decoder=h264_mediacodec,hevc_mediacodec,mpeg2_mediacodec,mpeg4_mediacodec,vp8_mediacodec,vp9_mediacodec,av1_mediacodec
\t# 音频解码器（IPTV/点播常见格式）
\t--enable-decoder=aac,aac_latm,mp3,mp2,mp1,ac3,eac3,dca,flac,opus,vorbis,alac
\t--enable-decoder=pcm_s16le,pcm_s24le,pcm_s32le,pcm_s16be,pcm_s24be,pcm_s32be
\t--enable-decoder=pcm_u8,pcm_f32le,pcm_f64le,pcm_s8,pcm_u16le,pcm_u24le,pcm_u32le
\t--enable-decoder=adpcm_ima_wav,adpcm_ms,adpcm_adx,adpcm_swf,g729
\t--enable-decoder=wmav1,wmav2,wmapro,wmalossless,wmavoice,cook,ra_144,ra_288,sipr
\t--enable-decoder=truehd,mlp,atrac3,atrac1,atrac3p
\t--enable-decoder=amrnb,amrwb,g726,g722
\t--enable-decoder=tak,tta,ape,shorten,imc"""

          content = content.replace(old_line, new_lines)

          with open('scripts/ffmpeg.sh', 'w') as f:
              f.write(content)
          print("=== Patched ffmpeg.sh (static + decoder stripping) ===")
          PYEOF

          echo "=== Verifying ffmpeg.sh ==="
          grep -E "static|shared|disable-decoders|enable-decoder" scripts/ffmpeg.sh | head -20

          # ========================================
          # 5. 修改 scripts/mpv.sh
          #    a) 创建 pkg-config --static 包装器（确保 meson 解析静态库的传递依赖）
          #    b) 清理 prefix 中的 .so 文件（强制静态链接）
          #    c) 保持 --default-library shared（libmpv.so 必须是动态库）
          # ========================================
          python3 <<'PYEOF'
          with open('scripts/mpv.sh', 'r') as f:
              content = f.read()

          # 在 "unset CC CXX" 之前插入静态链接准备代码
          prep_code = """# === 静态链接准备 ===
# 创建 pkg-config --static 包装器，确保 meson 解析 .pc 文件时包含 Libs.private
# （静态库没有 NEEDED entry，传递依赖必须通过 pkg-config --static 显式获取）
cat > "$prefix_dir/pkg-config-static" <<'PCWRAPPER'
#!/bin/bash
exec pkg-config --static "$@"
PCWRAPPER
chmod +x "$prefix_dir/pkg-config-static"

# 修改 cross-file 使用我们的包装器
sed -i "s|pkgconfig = 'pkg-config'|pkgconfig = '$prefix_dir/pkg-config-static'|" "$prefix_dir/crossfile.txt"
sed -i "s|pkg-config = 'pkg-config'|pkg-config = '$prefix_dir/pkg-config-static'|" "$prefix_dir/crossfile.txt"
echo "=== Cross-file pkg-config patched to use --static ==="

# 删除 prefix 中所有 .so 文件（强制 meson 只能找到 .a 静态库）
# meson 依赖（dav1d/libxml2/harfbuzz 等）由 cross-file 的 default_library=static 构建，已经是 .a
# FFmpeg/davs2 我们改成了静态，也是 .a
# mbedtls/lua 的 Makefile 会同时产出 .a 和 .so，删掉 .so 确保万无一失
find "$prefix_dir/lib" \\( -name "*.so" -o -name "*.so.*" \\) -delete 2>/dev/null || true
echo "=== Cleaned shared libraries from prefix ==="
echo "Remaining .a files:"
find "$prefix_dir/lib" -name "*.a" -ls | head -20
echo "Remaining .so files (should be none):"
find "$prefix_dir/lib" -name "*.so" -ls || echo "(none)"

"""

          content = content.replace('unset CC CXX # meson wants these unset', prep_code + 'unset CC CXX # meson wants these unset')

          with open('scripts/mpv.sh', 'w') as f:
              f.write(content)
          print("=== Patched mpv.sh (pkg-config --static + .so cleanup) ===")
          PYEOF

          echo "=== Verifying mpv.sh ==="
          head -40 scripts/mpv.sh

      - name: Download dependencies
        run: |
          cd mpv-android/buildscripts
          export IN_CI=1
          ./download.sh
          echo "=== FFmpeg source location ==="
          find . -type d -name "ffmpeg" | grep -v ".git" | head -5
          echo "=== davs2 source location ==="
          ls -la deps/davs2/ 2>/dev/null || { echo "ERROR: davs2 source not downloaded"; exit 1; }
          ls -la deps/davs2/build/linux/configure 2>/dev/null || { echo "ERROR: davs2 configure script not found"; exit 1; }

      - name: Apply CAVS patches to FFmpeg
        run: |
          cd mpv-android/buildscripts
          FFMPEG_DIR=""
          for candidate in deps/ffmpeg sources/ffmpeg; do
            if [ -d "$candidate/libavcodec" ]; then
              FFMPEG_DIR="$candidate"
              break
            fi
          done
          if [ -z "$FFMPEG_DIR" ]; then
            FFMPEG_DIR=$(find . -type d -name "ffmpeg" | grep -v ".git" | head -1)
            if [ ! -d "$FFMPEG_DIR/libavcodec" ]; then
              echo "ERROR: FFmpeg source directory with libavcodec not found"
              find . -type d -name "*ffmpeg*" | head -10
              exit 1
            fi
          fi
          echo "Found FFmpeg source: $FFMPEG_DIR"
          cd "$FFMPEG_DIR"

          CAVS_PATCHES="d208cf8 48ad875 e633613 fb9a3ec 0de8ee1 4cd3e6d"
          PATCHES_DIR="$(cd "$(dirname "$0")/../../cavs_patches" 2>/dev/null && pwd || echo "$GITHUB_WORKSPACE/cavs_patches")"
          echo "Using patches from: $PATCHES_DIR"
          for sha in $CAVS_PATCHES; do
            echo "=== Applying CAVS patch $sha ==="
            patch -p1 --batch --forward -i "$PATCHES_DIR/${sha}.patch" || true
          done

          # 手动修复 codec_id.h：添加 AV_CODEC_ID_DRA
          if ! grep -q AV_CODEC_ID_DRA libavcodec/codec_id.h; then
            if grep -q 'AV_CODEC_ID_AHX,' libavcodec/codec_id.h; then
              perl -i -pe 's/(AV_CODEC_ID_AHX,)/$1\n    AV_CODEC_ID_DRA,/' libavcodec/codec_id.h
            elif grep -q 'AV_CODEC_ID_G728,' libavcodec/codec_id.h; then
              perl -i -pe 's/(AV_CODEC_ID_G728,)/$1\n    AV_CODEC_ID_DRA,/' libavcodec/codec_id.h
            else
              echo "ERROR: Cannot find a suitable location to add AV_CODEC_ID_DRA to codec_id.h"
              exit 1
            fi
          fi
          grep -q AV_CODEC_ID_DRA libavcodec/codec_id.h || \
            { echo "ERROR: Failed to add AV_CODEC_ID_DRA to codec_id.h"; exit 1; }
          echo "=== AV_CODEC_ID_DRA added to codec_id.h ==="

          echo "=== Verify CAVS files exist ==="
          ls -la libavcodec/libcavs* libavcodec/libcavsdec* libavcodec/dradec* 2>/dev/null || \
            { echo "ERROR: CAVS patch did not apply correctly"; exit 1; }

      - name: Build libmpv for ${{ matrix.arch.name }}
        run: |
          cd mpv-android/buildscripts
          export IN_CI=1
          ./buildall.sh --arch ${{ matrix.arch.buildall_arg }} mpv
          echo "=== Build artifacts ==="
          find . -name "libmpv.so" -ls 2>/dev/null || true

      - name: Collect libmpv.so
        # 只收集 libmpv.so（所有依赖已静态链接进去）
        run: |
          cd mpv-android/buildscripts
          ARTIFACT_DIR="artifacts/${{ matrix.arch.name }}"
          mkdir -p "$ARTIFACT_DIR"

          MPV_SO=$(find . -name "libmpv.so" -type f | head -1)
          if [ -z "$MPV_SO" ]; then
              echo "ERROR: libmpv.so not found for ${{ matrix.arch.name }}"
              echo "=== Searching for any .so files ==="
              find . -name "*.so" -ls | head -30
              exit 1
          fi

          echo "Found libmpv.so: $MPV_SO"
          cp -L "$MPV_SO" "$ARTIFACT_DIR/"

          echo "=== Collected artifacts ==="
          ls -la "$ARTIFACT_DIR/"

          # 验证 CAVS 和 AVS2 支持
          echo "=== Checking cavs/avs2 strings in libmpv.so ==="
          strings "$ARTIFACT_DIR/libmpv.so" | grep -iE "guangdian|jizhun|cavs|avs2|libdavs2|davs2" | head -20 || \
            echo "WARNING: Could not find CAVS/AVS2 strings in libmpv.so"

          # 验证没有动态依赖 FFmpeg（应该全部静态链接了）
          echo "=== Checking dynamic dependencies (should not have libavcodec etc.) ==="
          if command -v readelf >/dev/null 2>&1; then
            readelf -d "$ARTIFACT_DIR/libmpv.so" 2>/dev/null | grep NEEDED || echo "(readelf not available)"
          elif command -v objdump >/dev/null 2>&1; then
            objdump -p "$ARTIFACT_DIR/libmpv.so" 2>/dev/null | grep NEEDED || echo "(objdump not available)"
          else
            echo "(readelf/objdump not available for checking NEEDED entries)"
          fi

          # 显示文件大小
          echo "=== libmpv.so size ==="
          ls -lh "$ARTIFACT_DIR/libmpv.so"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-cavs-android-${{ matrix.arch.name }}
          path: mpv-android/buildscripts/artifacts/${{ matrix.arch.name }}/
          retention-days: 7

  release:
    name: Package and upload to release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: libmpv-cavs-android-*
          path: artifacts
          merge-multiple: false

      - name: Package all ABIs
        run: |
          mkdir -p release/jniLibs
          for arch in arm64-v8a armeabi-v7a; do
            echo "=== Processing $arch ==="
            ARTIFACT_DIR="artifacts/libmpv-cavs-android-$arch"
            if [ -d "$ARTIFACT_DIR" ]; then
              mkdir -p "release/jniLibs/$arch"
              cp "$ARTIFACT_DIR"/*.so "release/jniLibs/$arch/" 2>/dev/null || true
              echo "Files in $arch:"
              ls -la "release/jniLibs/$arch/"
            else
              echo "WARNING: $arch artifact not found"
            fi
          done

          # 验证所有 ABI 都有 libmpv.so
          echo "=== Verifying all ABIs ==="
          for arch in arm64-v8a armeabi-v7a; do
            if [ ! -f "release/jniLibs/$arch/libmpv.so" ]; then
              echo "ERROR: libmpv.so missing for $arch"
              exit 1
            fi
          done

          # 打包
          cd release
          tar czf libmpv-cavs-android-static.tar.gz jniLibs
          ls -lh libmpv-cavs-android-static.tar.gz

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: release/libmpv-cavs-android-static.tar.gz
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
