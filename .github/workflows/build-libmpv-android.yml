name: Build libmpv with CAVS/AVS2 support (Android, static, stripped, optimized)

# Build libmpv for Android with CAVS (Guangdian) + AVS2 support
# Optimized: static linked + decoder stripped + size optimized + llvm-strip
# Output: single libmpv.so per arch

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. libmpv-cavs-static-latest)"
        required: true
        default: "libmpv-cavs-static-latest"

permissions:
  contents: write

env:
  MPV_ANDROID_REF: "2026-04-25"

jobs:
  build:
    name: Build libmpv ${{ matrix.arch.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        arch:
          - { name: arm64-v8a, buildall_arg: arm64 }
          - { name: armeabi-v7a, buildall_arg: armv7l }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ninja-build pkg-config \
            nasm yasm python3-pip git autoconf automake libtool \
            cmake ccache unzip wget curl \
            libssl-dev zlib1g-dev gperf
          sudo pip3 install --upgrade meson mako
          meson --version

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "ndk;29.0.14206865" "platform-tools"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"

      - name: Clone mpv-android
        run: |
          git clone --depth 1 --branch ${{ env.MPV_ANDROID_REF }} \
            https://github.com/mpv-android/mpv-android.git
          cd mpv-android
          git submodule update --init --recursive || true

      - name: Download CAVS patches
        run: |
          mkdir -p cavs_patches
          CAVS_PATCHES="d208cf8 48ad875 e633613 fb9a3ec 0de8ee1 4cd3e6d"
          for sha in $CAVS_PATCHES; do
            echo "Downloading CAVS patch $sha..."
            curl -fsSL "https://github.com/llawsxx/FFmpeg/commit/${sha}.patch" \
              -o "cavs_patches/${sha}.patch" || { echo "Failed to download patch $sha"; exit 1; }
          done
          ls -la cavs_patches/

      - name: Patch buildscripts
        run: |
          cd mpv-android/buildscripts

          # === 1. depinfo.sh: add davs2 ===
          sed -i '/^v_libxml2=/a v_davs2=1.7' include/depinfo.sh
          sed -i '/^dep_dav1d=/a dep_davs2=()' include/depinfo.sh
          sed -i 's/dep_ffmpeg=(mbedtls dav1d libxml2)/dep_ffmpeg=(mbedtls dav1d libxml2 davs2)/' include/depinfo.sh

          # === 2. download-deps.sh: add davs2 download ===
          sed -i '/^\[ ! -d dav1d \] && git clone https:\/\/github.com\/videolan\/dav1d$/a # davs2\n[ ! -d davs2 ] \&\& git clone --depth 1 --branch 1.7 https:\/\/github.com\/pkuvcl\/davs2.git' include/download-deps.sh

          # === 3. Create scripts/davs2.sh (static build) ===
          cat > scripts/davs2.sh << 'DAVS2EOF'
          #!/bin/bash -e
          . ../../include/path.sh
          if [ "$1" == "build" ]; then
          	true
          elif [ "$1" == "clean" ]; then
          	rm -rf _build$ndk_suffix
          	exit 0
          else
          	exit 255
          fi
          export CC="$CXX"
          git fetch origin --depth 1 master:refs/remotes/origin/master
          cd build/linux
          ./configure \
          	--host=$ndk_triple \
          	--prefix=/ \
          	--disable-shared \
          	--enable-static \
          	--enable-pic \
          	--disable-asm
          make -j$cores lib-static
          make DESTDIR="$prefix_dir" install-lib-static
          DAVS2EOF
          chmod +x scripts/davs2.sh

          # === 4. Patch ffmpeg.sh ===
          # 4a. Enable libdavs2
          sed -i 's/--enable-{jni,mediacodec,mbedtls,libdav1d,libxml2}/--enable-{jni,mediacodec,mbedtls,libdav1d,libxml2,libdavs2}/' scripts/ffmpeg.sh
          # 4b. Shared -> static
          sed -i 's/--disable-static --enable-shared/--enable-static --disable-shared/' scripts/ffmpeg.sh
          # 4c. Add --ar, --ranlib, and size optimization flags for FFmpeg
          sed -i 's/--cc=$CC --pkg-config=pkg-config --nm=llvm-nm/--cc=$CC --pkg-config=pkg-config --nm=llvm-nm --ar=llvm-ar --ranlib=llvm-ranlib --enable-small --optflags=-Os --disable-postproc --disable-avdevice --disable-debug --disable-programs --disable-doc/' scripts/ffmpeg.sh
          # 4c. Decoder stripping: write block to temp file then insert with sed r
          cat > /tmp/decoders.txt << 'DECEOF'
          	--disable-decoders
          	--enable-decoder=h264,hevc,mpeg1video,mpeg2video,mpeg4,msmpeg4v1,msmpeg4v2,msmpeg4v3
          	--enable-decoder=h263,h263i,h263p,flv,svq1,svq3,amv
          	--enable-decoder=vp3,vp5,vp6,vp6a,vp6f,vp7,vp8,vp9,av1
          	--enable-decoder=cavs,libdav1d,libdavs2,dra
          	--enable-decoder=vc1,vc1image,wmv1,wmv2,wmv3,wmv3image
          	--enable-decoder=theora,dvvideo,rawvideo
          	--enable-decoder=mjpeg,jpegls,png,prores,ffv1,huffyuv
          	--enable-decoder=rv10,rv20,rv30,rv40
          	--enable-decoder=4xm,qtrle,cinepak,msrle,msvideo1,utvideo,indeo3,indeo5
          	--enable-decoder=zlib,bzlib
          	--enable-decoder=h264_mediacodec,hevc_mediacodec,mpeg2_mediacodec,mpeg4_mediacodec,vp8_mediacodec,vp9_mediacodec,av1_mediacodec
          	--enable-decoder=aac,aac_latm,mp3,mp2,mp1,ac3,eac3,dca,flac,opus,vorbis,alac
          	--enable-decoder=pcm_s16le,pcm_s24le,pcm_s32le,pcm_s16be,pcm_s24be,pcm_s32be
          	--enable-decoder=pcm_u8,pcm_f32le,pcm_f64le,pcm_s8,pcm_u16le,pcm_u24le,pcm_u32le
          	--enable-decoder=adpcm_ima_wav,adpcm_ms,adpcm_adx,adpcm_swf,g729
          	--enable-decoder=wmav1,wmav2,wmapro,wmalossless,wmavoice,cook,ra_144,ra_288,sipr
          	--enable-decoder=truehd,mlp,atrac3,atrac1,atrac3p
          	--enable-decoder=amrnb,amrwb,g726,g722
          	--enable-decoder=tak,tta,ape,shorten,imc
          DECEOF
          sed -i '/--disable-{muxers,encoders,devices}/r /tmp/decoders.txt' scripts/ffmpeg.sh
          echo "=== ffmpeg.sh ==="
          grep -c "enable-decoder" scripts/ffmpeg.sh

          # === 5. Patch mpv.sh: static linking prep ===
          # Write prep script to temp file
          cat > /tmp/mpv_prep.sh << 'PREPEOF'
          # Create pkg-config --static wrapper
          cat > "$prefix_dir/pkg-config-static" << 'PCW'
          #!/bin/bash
          exec pkg-config --static "$@"
          PCW
          chmod +x "$prefix_dir/pkg-config-static"
          sed -i "s|pkgconfig = 'pkg-config'|pkgconfig = '$prefix_dir/pkg-config-static'|" "$prefix_dir/crossfile.txt"
          sed -i "s|pkg-config = 'pkg-config'|pkg-config = '$prefix_dir/pkg-config-static'|" "$prefix_dir/crossfile.txt"
          # Remove all .so files to force static linking
          find "$prefix_dir/lib" \( -name "*.so" -o -name "*.so.*" \) -delete 2>/dev/null || true
          echo "=== static prep done, .a files: ==="
          find "$prefix_dir/lib" -name "*.a" | wc -l
          PREPEOF
          # Insert "source /tmp/mpv_prep.sh" before "unset CC CXX" in mpv.sh
          sed -i '/^unset CC CXX/i\source /tmp/mpv_prep.sh' scripts/mpv.sh
          echo "=== mpv.sh ==="
          head -10 scripts/mpv.sh

      - name: Download dependencies
        run: |
          cd mpv-android/buildscripts
          export IN_CI=1
          ./download.sh
          echo "=== davs2 source ==="
          ls -la deps/davs2/build/linux/configure 2>/dev/null || { echo "ERROR: davs2 not found"; exit 1; }

      - name: Apply CAVS patches to FFmpeg
        run: |
          cd mpv-android/buildscripts
          FFMPEG_DIR=""
          for c in deps/ffmpeg sources/ffmpeg; do
            [ -d "$c/libavcodec" ] && FFMPEG_DIR="$c" && break
          done
          if [ -z "$FFMPEG_DIR" ]; then
            FFMPEG_DIR=$(find . -type d -name "ffmpeg" | grep -v ".git" | head -1)
          fi
          [ -d "$FFMPEG_DIR/libavcodec" ] || { echo "ERROR: no FFmpeg"; exit 1; }
          cd "$FFMPEG_DIR"

          PATCHES_DIR="$GITHUB_WORKSPACE/cavs_patches"
          for sha in d208cf8 48ad875 e633613 fb9a3ec 0de8ee1 4cd3e6d; do
            echo "=== Applying $sha ==="
            patch -p1 --batch --forward -i "$PATCHES_DIR/${sha}.patch" || true
          done

          if ! grep -q AV_CODEC_ID_DRA libavcodec/codec_id.h; then
            if grep -q 'AV_CODEC_ID_AHX,' libavcodec/codec_id.h; then
              perl -i -pe 's/(AV_CODEC_ID_AHX,)/$1\n    AV_CODEC_ID_DRA,/' libavcodec/codec_id.h
            elif grep -q 'AV_CODEC_ID_G728,' libavcodec/codec_id.h; then
              perl -i -pe 's/(AV_CODEC_ID_G728,)/$1\n    AV_CODEC_ID_DRA,/' libavcodec/codec_id.h
            else
              echo "ERROR: cannot add DRA"; exit 1
            fi
          fi
          ls -la libavcodec/libcavs* libavcodec/dradec* 2>/dev/null || { echo "ERROR: CAVS patch failed"; exit 1; }

      - name: Build libmpv
        run: |
          cd mpv-android/buildscripts
          export IN_CI=1
          ./buildall.sh --arch ${{ matrix.arch.buildall_arg }} mpv
          find . -name "libmpv.so" -ls 2>/dev/null || true

      - name: Collect libmpv.so
        run: |
          cd mpv-android/buildscripts
          mkdir -p "artifacts/${{ matrix.arch.name }}"
          MPV_SO=$(find . -name "libmpv.so" -type f | head -1)
          if [ -z "$MPV_SO" ]; then
            echo "ERROR: libmpv.so not found"
            find . -name "*.so" -ls | head -30
            exit 1
          fi
          echo "=== Size before strip ==="
          ls -lh "$MPV_SO"
          # Strip debug symbols using NDK llvm-strip (biggest size reduction)
          STRIP_TOOL="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          if [ -f "$STRIP_TOOL" ]; then
            "$STRIP_TOOL" --strip-all "$MPV_SO"
            echo "=== Size after strip ==="
            ls -lh "$MPV_SO"
          else
            echo "WARNING: llvm-strip not found at $STRIP_TOOL, skipping strip"
          fi
          cp -L "$MPV_SO" "artifacts/${{ matrix.arch.name }}/"
          echo "=== Final size ==="
          ls -lh "artifacts/${{ matrix.arch.name }}/libmpv.so"
          echo "=== CAVS/AVS2 check ==="
          strings "artifacts/${{ matrix.arch.name }}/libmpv.so" | grep -iE "cavs|avs2|davs2|guangdian" | head -20 || echo "WARNING: no CAVS/AVS2"
          echo "=== NEEDED check ==="
          readelf -d "artifacts/${{ matrix.arch.name }}/libmpv.so" 2>/dev/null | grep NEEDED || echo "(none)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-cavs-android-${{ matrix.arch.name }}
          path: mpv-android/buildscripts/artifacts/${{ matrix.arch.name }}/
          retention-days: 7

  release:
    name: Package and upload
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: libmpv-cavs-android-*
          path: artifacts
          merge-multiple: false

      - name: Package
        run: |
          mkdir -p release/jniLibs
          for arch in arm64-v8a armeabi-v7a; do
            DIR="artifacts/libmpv-cavs-android-$arch"
            if [ -d "$DIR" ]; then
              mkdir -p "release/jniLibs/$arch"
              cp "$DIR"/*.so "release/jniLibs/$arch/"
              ls -la "release/jniLibs/$arch/"
            fi
          done
          for arch in arm64-v8a armeabi-v7a; do
            [ -f "release/jniLibs/$arch/libmpv.so" ] || { echo "ERROR: missing $arch"; exit 1; }
          done
          cd release
          tar czf libmpv-cavs-android-static.tar.gz jniLibs
          ls -lh libmpv-cavs-android-static.tar.gz

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: release/libmpv-cavs-android-static.tar.gz
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
